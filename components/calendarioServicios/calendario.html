<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calendario.css">
    <title>Calendario de servicios</title>
</head>

<body>
    <!-- Encabezado con logo y barra de progreso del flujo de reserva -->
    <header>
        <div class="booking-header-steps" id="bookingHeaderSteps">
            <div class="booking-step-dot active" id="bookingStepDot1"></div>
            <div class="booking-step-dot" id="bookingStepDot2"></div>
            <div class="booking-step-dot" id="bookingStepDot3"></div>
        </div>
    </header>
    <div class="calendar-page-container">

        <!-- PASO 01: Selección de estilista -->
        <div class="calendar-section-header">
            <span class="section-number">01</span>
            <span class="section-title">Elegir profesional</span>
        </div>

        <!-- Contenedor donde se inyecta el listado de estilistas desde JavaScript -->
        <div class="stylists-list-grid" id="stylistsListContainer"></div>

        <!-- Separador entre el paso de estilista y el paso de cita -->
        <hr class="section-divider" id="bookingSectionDivider" style="display:none;">
        
        <!-- Elemento de plantilla para las tarjetas de estilista -->
        <template id="stylistCardTemplate">
            <div class="stylist-card">
                <div class="check-icon">...</div>
                <div class="avatar"></div>
                <div class="stylist-name"></div>
                <div class="stylist-spec"></div>
            </div>
        </template>

        <!-- PASO 02: Selección de fecha y hora -->
        <div id="bookingStepSection" style="display:none;">
            <div class="calendar-section-header">
                <span class="section-number">02</span>
                <span class="section-title">Fecha y hora</span>
            </div>

            <div class="booking-area-wrapper" id="bookingAreaWrapper">
                <!-- Panel del calendario donde se muestran los días del mes -->
                <div class="booking-calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav-button" id="calendarPreviousMonthButton">&#8249;</button>
                        <span class="calendar-month-label" id="calendarMonthLabel"></span>
                        <button class="calendar-nav-button" id="calendarNextMonthButton">&#8250;</button>
                    </div>
                    <div class="calendar-grid" id="calendarDaysGrid"></div>
                </div>

                <!-- Panel de selección de horarios disponibles para el día elegido -->
                <div class="booking-times-panel">
                    <div class="times-label">Horarios disponibles</div>
                    <div class="selected-booking-date-display" id="selectedBookingDateDisplay">—</div>
                    <div id="bookingTimesContainer">
                        <div class="placeholder-message">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1">
                                <rect x="3" y="4" width="18" height="18" rx="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            Selecciona un día disponible
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PASO 03: Confirmación de la reserva -->
        <div id="reservationConfirmSection" class="reservation-confirm-section" style="display:none;">
            <hr class="section-divider">
            <div class="calendar-section-header">
                <span class="section-number">03</span>
                <span class="section-title">Confirmar reserva</span>
            </div>
            <!-- Contenedor donde se renderiza el resumen final y el botón de confirmar -->
            <div class="reservation-confirm-card" id="reservationConfirmCard"></div>
        </div>

    </div>

    <!-- Toast de confirmación emergente -->
    <div class="reservation-toast" id="reservationToast"></div>

    <!-- Script principal que controla la interacción del calendario -->
    <script src="calendario.js"></script>
</body>

</html>
