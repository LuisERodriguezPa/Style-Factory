<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="navbar_Admin.css">
    <title>Navbar Admin</title>
</head>
<body>

<!-- Botón hamburguesa independiente -->
<button class="boton-hamburguesa" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral" aria-controls="menuLateral">
  ☰
</button>

<!-- Menú lateral oculto -->
<div class="offcanvas offcanvas-start menu-lateral" tabindex="-1" id="menuLateral" aria-labelledby="menuTitulo">
  <div class="offcanvas-header">
  <img src="/assets/images/logo_fondo_transparente.png" alt="Logo" class="logo-menu">

  </div>
  <div class="offcanvas-body">
    <ul class="lista-menu">
    <li><a class="boton-menu" href="#"><i class="bi bi-speedometer2"></i> Panel</a></li>
    <li><a class="boton-menu" href="#"><i class="bi bi-briefcase"></i> Servicios</a></li>
    <li><a class="boton-menu" href="#"><i class="bi bi-calendar-check"></i> Reservas</a></li>
     </ul>
     <!-- Botón independiente de salir -->
  <button class="boton-salir">
  <i class="bi bi-box-arrow-right"></i> 
</button>
</div>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  

 <script>
    const boton = document.querySelector('.boton-hamburguesa');
    const menu = document.querySelector('#menuLateral');

    // Al pasar el cursor por el botón hamburguesa
    boton.addEventListener('mouseenter', () => {
      const bsOffcanvas = new bootstrap.Offcanvas(menu);
      bsOffcanvas.show();
    });

    // Al salir el cursor del menú, se cierra
    menu.addEventListener('mouseleave', () => {
      const bsOffcanvas = new bootstrap.Offcanvas(menu);
      bsOffcanvas.hide();
    });
  </script>

  
</body>
</html>
